services:
  - type: web
    name: amigopet-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
